<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>vLLM Gemma Chat</title>
<style>
  :root {
    --bg: #0d0d0f;
    --bg-elev: #16161a;
    --bg-elev-2: #1e1e24;
    --border: #2a2a31;
    --text: #ececf1;
    --text-dim: #9a9aa5;
    --accent: #10a37f;
    --accent-hover: #1abd95;
    --user-bubble: #2a2a31;
    --danger: #e0564f;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Top bar */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-elev);
    flex-shrink: 0;
  }
  header .brand { font-weight: 600; font-size: 15px; letter-spacing: .2px; }
  header .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #6b6b73; transition: background .3s;
    box-shadow: 0 0 0 0 rgba(16,163,127,.4);
  }
  header .dot.online { background: var(--accent); }
  header .model {
    color: var(--text-dim); font-size: 12px;
    max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  header .spacer { flex: 1; }
  .btn {
    background: var(--bg-elev-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 7px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }
  .btn:hover { background: #2a2a31; }
  .btn.icon { padding: 7px 9px; }

  /* Chat area */
  main {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  #messages { max-width: 820px; margin: 0 auto; padding: 24px 18px 40px; }

  .msg { display: flex; gap: 14px; padding: 18px 0; border-bottom: 1px solid rgba(42,42,49,.5); }
  .msg .avatar {
    width: 30px; height: 30px; border-radius: 7px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
  }
  .msg.user .avatar { background: #4b5563; }
  .msg.assistant .avatar { background: var(--accent); }
  .msg .content {
    flex: 1; min-width: 0; line-height: 1.65; font-size: 15px;
    padding-top: 4px; word-wrap: break-word; overflow-wrap: anywhere;
  }
  .msg .content p { margin: 0 0 12px; }
  .msg .content p:last-child { margin-bottom: 0; }
  .msg .content pre {
    background: #0a0a0c; border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; overflow-x: auto; margin: 12px 0;
    font-size: 13.5px;
  }
  .msg .content code {
    font-family: "SF Mono", "Cascadia Code", Consolas, monospace;
    background: #0a0a0c; padding: 2px 6px; border-radius: 5px; font-size: 13.5px;
  }
  .msg .content pre code { background: none; padding: 0; }
  .msg .content h2, .msg .content h3, .msg .content h4 {
    margin: 16px 0 8px; line-height: 1.3; font-weight: 600;
  }
  .msg .content h2 { font-size: 19px; }
  .msg .content h3 { font-size: 16.5px; }
  .msg .content h4 { font-size: 15px; color: var(--text-dim); }
  .msg .content ul, .msg .content ol { margin: 8px 0; padding-inline-start: 24px; }
  .msg .content li { margin: 4px 0; }
  .msg .content li::marker { color: var(--text-dim); }
  .cursor-blink::after {
    content: "▍"; color: var(--accent);
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 0%,50%{opacity:1;} 50.1%,100%{opacity:0;} }

  .empty {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; color: var(--text-dim);
    gap: 10px; text-align: center; padding: 40px;
  }
  .empty h1 { color: var(--text); font-size: 22px; margin: 0; font-weight: 600; }
  .empty .chips { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .chip {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; font-size: 13px;
    cursor: pointer; color: var(--text); max-width: 240px;
  }
  .chip:hover { border-color: var(--accent); }

  /* Composer */
  footer { flex-shrink: 0; padding: 0 18px 18px; background: var(--bg); }
  .composer {
    max-width: 820px; margin: 0 auto;
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
    display: flex; align-items: flex-end; gap: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,.35);
  }
  .composer:focus-within { border-color: #3a3a44; }
  #input {
    flex: 1; background: none; border: none; color: var(--text);
    resize: none; outline: none; font-size: 15px; line-height: 1.5;
    max-height: 200px; font-family: inherit; padding: 6px 4px;
  }
  #input::placeholder { color: var(--text-dim); }
  .send {
    width: 34px; height: 34px; border-radius: 9px; border: none;
    background: var(--accent); color: #fff; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; transition: background .15s;
  }
  .send:hover { background: var(--accent-hover); }
  .send:disabled { background: #2a2a31; color: var(--text-dim); cursor: not-allowed; }
  .send.stop { background: var(--danger); }
  .hint { max-width: 820px; margin: 8px auto 0; text-align: center; color: var(--text-dim); font-size: 11px; }

  /* Settings panel */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    display: none; align-items: center; justify-content: center; z-index: 10;
  }
  .overlay.open { display: flex; }
  .panel {
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 16px; width: 460px; max-width: calc(100vw - 32px);
    padding: 22px; max-height: 90vh; overflow-y: auto;
  }
  .panel h2 { margin: 0 0 18px; font-size: 17px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
  .field input, .field textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 9px; padding: 9px 11px; color: var(--text); font-size: 14px;
    font-family: inherit; outline: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field .row { display: flex; align-items: center; gap: 10px; }
  .field .row input[type=range] { flex: 1; accent-color: var(--accent); }
  .field .val { width: 44px; text-align: right; font-variant-numeric: tabular-nums; color: var(--text); }
  .panel .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
  .btn.primary { background: var(--accent); border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-hover); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-thumb { background: #2a2a31; border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a44; }

  /* Syntax highlighting container polish */
  .msg .content pre code.hljs {
    background: none; padding: 0;
    font-family: "SF Mono", "Cascadia Code", Consolas, monospace;
  }

  /* Copy buttons */
  .msg .content pre { position: relative; }
  .code-copy {
    position: absolute; top: 8px; right: 8px;
    background: #1e1e24; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 7px;
    padding: 3px 9px; font-size: 11.5px; cursor: pointer;
    opacity: 0; transition: opacity .15s, color .15s; font-family: inherit;
  }
  .msg .content pre:hover .code-copy { opacity: 1; }
  .code-copy:hover { color: var(--text); border-color: #3a3a44; }
  .code-copy.copied { color: var(--accent); border-color: var(--accent); opacity: 1; }

  .msg-actions { margin-top: 12px; display: flex; gap: 8px; }
  .msg-copy {
    background: none; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 7px;
    padding: 4px 10px; font-size: 12px; cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px; transition: color .15s, border-color .15s;
  }
  .msg-copy:hover { color: var(--text); border-color: #3a3a44; background: var(--bg-elev-2); }
  .msg-copy.copied { color: var(--accent); border-color: var(--accent); }

  .truncation-note {
    margin-top: 14px;
    display: flex; align-items: center; gap: 7px;
    font-size: 12.5px; color: #e0a23f;
    background: rgba(224,162,63,.08);
    border: 1px solid rgba(224,162,63,.3);
    border-radius: 8px; padding: 7px 11px;
  }
  .msg-continue {
    background: var(--accent); color: #fff; border: 1px solid var(--accent);
    border-radius: 7px; padding: 5px 13px; font-size: 12px; cursor: pointer;
    font-family: inherit; font-weight: 600;
    display: inline-flex; align-items: center; gap: 6px; transition: background .15s;
  }
  .msg-continue:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .msg-continue:disabled { opacity: .5; cursor: default; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <header>
    <span class="dot" id="statusDot"></span>
    <span class="brand">Local Gemma</span>
    <span class="model" id="modelName">connecting…</span>
    <span class="spacer"></span>
    <button class="btn" id="newChatBtn">New chat</button>
    <button class="btn icon" id="settingsBtn" title="Settings">⚙</button>
  </header>

  <main id="main">
    <div id="messages"></div>
  </main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="Message Gemma…"></textarea>
      <button class="send" id="sendBtn" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
      </button>
    </div>
    <div class="hint">Enter to send · Shift+Enter for newline · Runs fully on your local GPU</div>
  </footer>

  <div class="overlay" id="overlay">
    <div class="panel">
      <h2>Settings</h2>
      <div class="field">
        <label>API base URL</label>
        <input type="text" id="setEndpoint" />
      </div>
      <div class="field">
        <label>System prompt</label>
        <textarea id="setSystem" rows="3"></textarea>
      </div>
      <div class="field">
        <label>Temperature</label>
        <div class="row">
          <input type="range" id="setTemp" min="0" max="2" step="0.05" />
          <span class="val" id="tempVal"></span>
        </div>
      </div>
      <div class="field">
        <label>Max tokens</label>
        <input type="number" id="setMaxTokens" min="16" max="4096" step="16" />
      </div>
      <div class="actions">
        <button class="btn" id="closeSettings">Close</button>
        <button class="btn primary" id="saveSettings">Save</button>
      </div>
    </div>
  </div>

<script>
const DEFAULTS = {
  endpoint: "http://localhost:8000/v1",
  system: "You are a helpful, concise assistant running locally.",
  temperature: 0.7,
  maxTokens: 1024,
};

const cfg = loadConfig();
let model = null;
let messages = [];          // {role, content}
let controller = null;      // AbortController for streaming
let streaming = false;

const $ = (id) => document.getElementById(id);
const elMessages = $("messages");
const elMain = $("main");
const elInput = $("input");
const elSend = $("sendBtn");

function loadConfig() {
  try { return { ...DEFAULTS, ...JSON.parse(localStorage.getItem("gemmaChatCfg") || "{}") }; }
  catch { return { ...DEFAULTS }; }
}
function saveConfig() { localStorage.setItem("gemmaChatCfg", JSON.stringify(cfg)); }

/* ---------- Model discovery ---------- */
async function refreshModel() {
  try {
    const r = await fetch(`${cfg.endpoint}/models`);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    model = data.data?.[0]?.id || null;
    $("modelName").textContent = model || "no model";
    $("statusDot").classList.add("online");
  } catch (e) {
    model = null;
    $("modelName").textContent = "offline — is vLLM running?";
    $("statusDot").classList.remove("online");
  }
}

/* ---------- Minimal markdown rendering (safe) ---------- */
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function inlineMd(s) {
  return escapeHtml(s)
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*\n]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
}

function renderTextBlock(text) {
  const lines = text.split("\n");
  let html = "";
  let para = [];
  let listType = null, listItems = [];
  const flushPara = () => {
    if (para.length) { html += `<p dir="auto">${para.map(inlineMd).join("<br>")}</p>`; para = []; }
  };
  const flushList = () => {
    if (listItems.length) {
      html += `<${listType} dir="auto">` + listItems.map(it => `<li>${inlineMd(it)}</li>`).join("") + `</${listType}>`;
      listItems = []; listType = null;
    }
  };
  for (const line of lines) {
    const t = line.trim();
    const h = t.match(/^(#{1,6})\s+(.*)$/);
    const ul = t.match(/^[*-]\s+(.*)$/);
    const ol = t.match(/^\d+\.\s+(.*)$/);
    if (h) {
      flushPara(); flushList();
      const lvl = Math.min(h[1].length + 1, 6);
      html += `<h${lvl} dir="auto">${inlineMd(h[2])}</h${lvl}>`;
    } else if (ul) {
      flushPara();
      if (listType !== "ul") flushList();
      listType = "ul"; listItems.push(ul[1]);
    } else if (ol) {
      flushPara();
      if (listType !== "ol") flushList();
      listType = "ol"; listItems.push(ol[1]);
    } else if (t === "") {
      flushPara(); flushList();
    } else {
      flushList();
      para.push(line);
    }
  }
  flushPara(); flushList();
  return html;
}

function highlightCode(body, lang) {
  if (!window.hljs) return null;
  try {
    if (lang && hljs.getLanguage(lang)) return hljs.highlight(body, { language: lang, ignoreIllegals: true }).value;
    return hljs.highlightAuto(body).value;
  } catch { return null; }
}

// Index where the still-streaming "live" region begins: everything before it
// (finished text + closed code blocks) is stable and never re-rendered.
function liveStartIndex(text) {
  const positions = [];
  let p = text.indexOf("```");
  while (p !== -1) { positions.push(p); p = text.indexOf("```", p + 3); }
  if (positions.length === 0) return 0;
  return positions.length % 2 === 0
    ? positions[positions.length - 1] + 3   // after the last closing fence
    : positions[positions.length - 1];      // start of the open code block
}

// `cache` (optional array) memoizes highlighted HTML per completed code block,
// so closed blocks colorize immediately and never re-process or flicker.
function renderMarkdown(text, cache) {
  const parts = text.split("```");
  let html = "";
  let codeIdx = -1;
  parts.forEach((part, i) => {
    if (i % 2 === 1) {
      codeIdx++;
      const nl = part.indexOf("\n");
      const lang = nl >= 0 ? part.slice(0, nl).trim().toLowerCase() : "";
      const body = nl >= 0 ? part.slice(nl + 1) : part;
      const langOk = /^[a-z0-9+#-]+$/.test(lang);
      const closed = i !== parts.length - 1;
      let inner;
      if (closed) {
        const k = codeIdx;
        if (cache && cache[k] && cache[k].body === body) {
          inner = cache[k].html;
        } else {
          const hl = highlightCode(body, langOk ? lang : "");
          inner = hl != null ? hl : escapeHtml(body);
          if (cache) cache[k] = { body, html: inner };
        }
      } else {
        inner = escapeHtml(body);
      }
      const cls = langOk ? `language-${lang} hljs` : "hljs";
      html += `<pre dir="ltr"><code class="${cls}">${inner}</code></pre>`;
    } else {
      html += renderTextBlock(part);
    }
  });
  return html;
}

/* ---------- Copy helpers ---------- */
function copyToClipboard(text) {
  if (navigator.clipboard && window.isSecureContext) {
    return navigator.clipboard.writeText(text);
  }
  return new Promise((resolve, reject) => {
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
      resolve();
    } catch (e) { reject(e); }
  });
}
function flashBtn(btn, label) {
  const old = btn.innerHTML;
  btn.classList.add("copied");
  btn.innerHTML = label;
  setTimeout(() => { btn.innerHTML = old; btn.classList.remove("copied"); }, 1500);
}
function addCodeCopyButtons(container, skipLastOpen) {
  const pres = container.querySelectorAll("pre");
  pres.forEach((pre, idx) => {
    if (skipLastOpen && idx === pres.length - 1) return;
    if (pre.querySelector(".code-copy")) return;
    const btn = document.createElement("button");
    btn.className = "code-copy";
    btn.type = "button";
    btn.textContent = "Copy";
    btn.addEventListener("click", () => {
      const code = pre.querySelector("code");
      copyToClipboard(code ? code.textContent : pre.textContent)
        .then(() => flashBtn(btn, "Copied")).catch(() => {});
    });
    pre.appendChild(btn);
  });
}
function addMessageActions(wrap, msg) {
  const content = wrap.querySelector(".content");
  if (!content) return;
  content.querySelectorAll(".truncation-note, .msg-actions").forEach(el => el.remove());

  if (msg.truncated) {
    const note = document.createElement("div");
    note.className = "truncation-note";
    note.innerHTML = '&#9888;&#65039; This answer was cut off because it reached the length limit.';
    content.appendChild(note);
  }

  const bar = document.createElement("div");
  bar.className = "msg-actions";

  if (msg.truncated) {
    const cont = document.createElement("button");
    cont.className = "msg-continue";
    cont.type = "button";
    cont.innerHTML = "&#8594; Continue answer";
    cont.title = "Ask the model to keep going from where it stopped";
    cont.addEventListener("click", () => continueLastAnswer(cont));
    bar.appendChild(cont);
  }

  const copy = document.createElement("button");
  copy.className = "msg-copy";
  copy.type = "button";
  copy.textContent = "Copy message";
  copy.addEventListener("click", () =>
    copyToClipboard(msg.content).then(() => flashBtn(copy, "Copied!")).catch(() => {}));
  bar.appendChild(copy);

  content.appendChild(bar);
}
function enhanceMessage(wrap, msg) {
  if (!wrap) return;
  addCodeCopyButtons(wrap.querySelector(".content"), false);
  if (msg.role === "assistant") addMessageActions(wrap, msg);
}

/* ---------- Rendering ---------- */
function renderEmpty() {
  elMessages.innerHTML = `
    <div class="empty">
      <h1>Talk to Gemma, locally</h1>
      <div>Private. Nothing leaves your machine.</div>
      <div class="chips">
        <div class="chip">Explain what vLLM does in simple terms</div>
        <div class="chip">Write a Python function to read a CSV</div>
        <div class="chip">Give me 3 dinner ideas with chicken</div>
      </div>
    </div>`;
  elMessages.querySelectorAll(".chip").forEach(c =>
    c.addEventListener("click", () => { elInput.value = c.textContent; autoGrow(); send(); }));
}

function renderMessages() {
  if (messages.length === 0) { renderEmpty(); return; }
  elMessages.innerHTML = "";
  messages.forEach(m => {
    const wrap = document.createElement("div");
    wrap.className = `msg ${m.role}`;
    wrap.innerHTML = `
      <div class="avatar">${m.role === "user" ? "You" : "G"}</div>
      <div class="content"></div>`;
    wrap.querySelector(".content").innerHTML = renderMarkdown(m.content, []);
    elMessages.appendChild(wrap);
    enhanceMessage(wrap, m);
  });
}

function appendStreamingBubble() {
  const wrap = document.createElement("div");
  wrap.className = "msg assistant";
  wrap.innerHTML = `<div class="avatar">G</div><div class="content"></div>`;
  elMessages.appendChild(wrap);
  scrollToBottom();
  return wrap.querySelector(".content");
}

let autoScroll = true;
function scrollToBottom() {
  if (!autoScroll) return;
  elMain.scrollTo({ top: elMain.scrollHeight, behavior: "auto" });
}
elMain.addEventListener("scroll", () => {
  const distanceFromBottom = elMain.scrollHeight - elMain.scrollTop - elMain.clientHeight;
  autoScroll = distanceFromBottom < 80;
});

/* ---------- Sending / streaming ----------
   Streams a completion into `contentEl`, committing finished segments to a
   stable container so they never re-render (no flicker). `seedText` lets a
   continuation pick up from an existing partial answer.
   Returns { acc, finishReason, error }. */
async function runStream(payloadMessages, contentEl, seedText = "") {
  contentEl.innerHTML = '<div class="md-stable"></div><div class="md-live"></div>';
  const stableEl = contentEl.querySelector(".md-stable");
  const liveEl = contentEl.querySelector(".md-live");
  let acc = seedText;
  let committed = 0;
  if (seedText) {
    const ls = liveStartIndex(seedText);
    if (ls > 0) {
      stableEl.insertAdjacentHTML("beforeend", renderMarkdown(seedText.slice(0, ls)));
      addCodeCopyButtons(stableEl, false);
      committed = ls;
    }
    liveEl.innerHTML = renderMarkdown(acc.slice(committed));
  }
  let finishReason = null;
  streaming = true;
  setSendMode(true);
  controller = new AbortController();

  try {
    const resp = await fetch(`${cfg.endpoint}/chat/completions`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model,
        messages: payloadMessages,
        stream: true,
        temperature: cfg.temperature,
        max_tokens: cfg.maxTokens,
      }),
      signal: controller.signal,
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        const t = line.trim();
        if (!t.startsWith("data:")) continue;
        const payload = t.slice(5).trim();
        if (payload === "[DONE]") continue;
        try {
          const json = JSON.parse(payload);
          const choice = json.choices?.[0];
          if (choice?.finish_reason) finishReason = choice.finish_reason;
          const delta = choice?.delta?.content || "";
          if (delta) {
            acc += delta;
            const ls = liveStartIndex(acc);
            if (ls > committed) {
              stableEl.insertAdjacentHTML("beforeend", renderMarkdown(acc.slice(committed, ls)));
              addCodeCopyButtons(stableEl, false);
              committed = ls;
            }
            liveEl.innerHTML = renderMarkdown(acc.slice(committed));
            scrollToBottom();
          }
        } catch {}
      }
    }
    return { acc, finishReason, error: null };
  } catch (e) {
    if (e.name === "AbortError") return { acc, finishReason: "abort", error: null };
    return { acc, finishReason: null, error: e };
  } finally {
    streaming = false;
    controller = null;
    setSendMode(false);
  }
}

async function send() {
  const text = elInput.value.trim();
  if (!text || streaming) return;
  if (!model) { await refreshModel(); if (!model) return; }

  messages.push({ role: "user", content: text });
  elInput.value = "";
  autoGrow();
  renderMessages();
  autoScroll = true;
  scrollToBottom();

  const contentEl = appendStreamingBubble();
  const payloadMessages = [{ role: "system", content: cfg.system }, ...messages];
  const { acc, finishReason, error } = await runStream(payloadMessages, contentEl);

  if (!contentEl.isConnected) return; // chat was reset mid-stream
  if (error) {
    contentEl.innerHTML = `<p style="color:var(--danger)">Error: ${escapeHtml(error.message)}</p>`;
    return;
  }
  if (!acc) { contentEl.innerHTML = `<p style="color:var(--text-dim)">(no output)</p>`; return; }

  const msg = { role: "assistant", content: acc, truncated: finishReason === "length" };
  messages.push(msg);
  contentEl.innerHTML = renderMarkdown(acc, []);
  enhanceMessage(contentEl.closest(".msg"), msg);
}

async function continueLastAnswer(btn) {
  if (streaming) return;
  let idx = messages.length - 1;
  while (idx >= 0 && messages[idx].role !== "assistant") idx--;
  if (idx < 0) return;

  const msg = messages[idx];
  const wrap = btn.closest(".msg");
  const contentEl = wrap.querySelector(".content");
  autoScroll = true;

  const payloadMessages = [
    { role: "system", content: cfg.system },
    ...messages.slice(0, idx + 1),
    { role: "user", content: "Continue the previous answer exactly from where you stopped. Do not repeat anything you already wrote." },
  ];
  const { acc, finishReason, error } = await runStream(payloadMessages, contentEl, msg.content);

  if (!contentEl.isConnected) return;
  if (error) {
    enhanceMessage(wrap, msg); // restore actions (still truncated)
    return;
  }
  msg.content = acc;
  msg.truncated = finishReason === "length";
  contentEl.innerHTML = renderMarkdown(msg.content, []);
  enhanceMessage(wrap, msg);
}

function stopStreaming() { if (controller) controller.abort(); }

function setSendMode(isStreaming) {
  if (isStreaming) {
    elSend.classList.add("stop");
    elSend.title = "Stop";
    elSend.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="5" width="14" height="14" rx="2"></rect></svg>`;
  } else {
    elSend.classList.remove("stop");
    elSend.title = "Send";
    elSend.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>`;
  }
}

/* ---------- Composer behavior ---------- */
function autoGrow() {
  elInput.style.height = "auto";
  elInput.style.height = Math.min(elInput.scrollHeight, 200) + "px";
}
elInput.addEventListener("input", autoGrow);
elInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
elSend.addEventListener("click", () => { streaming ? stopStreaming() : send(); });

$("newChatBtn").addEventListener("click", () => {
  if (streaming) stopStreaming();
  messages = [];
  renderMessages();
  elInput.focus();
});

/* ---------- Settings ---------- */
const overlay = $("overlay");
function openSettings() {
  $("setEndpoint").value = cfg.endpoint;
  $("setSystem").value = cfg.system;
  $("setTemp").value = cfg.temperature;
  $("tempVal").textContent = Number(cfg.temperature).toFixed(2);
  $("setMaxTokens").value = cfg.maxTokens;
  overlay.classList.add("open");
}
$("settingsBtn").addEventListener("click", openSettings);
$("closeSettings").addEventListener("click", () => overlay.classList.remove("open"));
overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.remove("open"); });
$("setTemp").addEventListener("input", (e) => $("tempVal").textContent = Number(e.target.value).toFixed(2));
$("saveSettings").addEventListener("click", () => {
  cfg.endpoint = $("setEndpoint").value.trim().replace(/\/$/, "");
  cfg.system = $("setSystem").value;
  cfg.temperature = parseFloat($("setTemp").value);
  cfg.maxTokens = parseInt($("setMaxTokens").value, 10) || DEFAULTS.maxTokens;
  saveConfig();
  overlay.classList.remove("open");
  refreshModel();
});

/* ---------- Init ---------- */
renderMessages();
refreshModel();
setInterval(refreshModel, 15000);
elInput.focus();
</script>
</body>
