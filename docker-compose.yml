services:
  gemma4-vllm:
    image: vllm/vllm-openai:latest
    container_name: gemma4-vllm
    ports:
      - "8000:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    ipc: host
    command:
      - --model
      - ${GEMMA_MODEL:-google/gemma-4-12B-it-qat-w4a16-ct}
      - --max-model-len
      - "${MAX_MODEL_LEN:-4096}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTIL:-0.90}"
      - --enforce-eager
      - --limit-mm-per-prompt
      - '${LIMIT_MM_PER_PROMPT:-{"image": 4}}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  web:
    image: nginx:alpine
    container_name: gemma4-web
    ports:
      - "8080:80"
    volumes:
      - ./chat.html:/usr/share/nginx/html/chat.html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - gemma4-vllm

volumes:
  huggingface-cache:
